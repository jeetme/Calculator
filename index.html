<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="calculator.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
</head>

<body>
    <div class="body">
        <input class="display-box" placeholder="0"> <br>

        <button class="clear" onclick="clearAll()">AC</button>
        <button class="input-btn operator" data-value="(">(</button>
        <button class="input-btn operator" data-value=")">)</button>
        <button class="input-btn operator" data-value="/">/</button> <br>
        <button class="input-btn" data-value="7">7</button>
        <button class="input-btn" data-value="8">8</button>
        <button class="input-btn" data-value="9">9</button>
        <button class="input-btn operator" data-value="*">*</button> <br>
        <button class="input-btn" data-value="4">4</button>
        <button class="input-btn" data-value="5">5</button>
        <button class="input-btn" data-value="6">6</button>
        <button class="input-btn operator" data-value="-">-</button> <br>
        <button class="input-btn" data-value="1">1</button>
        <button class="input-btn" data-value="2">2</button>
        <button class="input-btn" data-value="3">3</button>
        <button class="input-btn operator" data-value="+">+</button> <br>
        <button class="input-btn" data-value="0">0</button>
        <button class="input-btn" data-value=".">.</button>
        <button class="del" onclick="pop()">DEL</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>

    <script src="calculator.js"></script>
</body>

</html>
